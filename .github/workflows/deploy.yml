name: Deploy to Server

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}

            git pull origin master

            cd ${{ secrets.DEPLOY_PATH }}/server && npm install
            cd ${{ secrets.DEPLOY_PATH }}/client && npm install

            cd ${{ secrets.DEPLOY_PATH }}/client && npm run build

            pm2 delete whattoeat 2>/dev/null || true
            cd ${{ secrets.DEPLOY_PATH }}/server
            pm2 start server.js --name whattoeat --update-env
            pm2 save
